name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            cxx: g++
            build_type: Debug
          - compiler: gcc
            cxx: g++
            build_type: Release
          - compiler: clang
            cxx: clang++
            build_type: Debug

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        env:
          CXX: ${{ matrix.cxx }}
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCPP_THREAD_POOL_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build --parallel 2

      - name: Test
        run: ctest --test-dir build --output-on-failure

  quality:
    name: Formatting and static analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install analysis tools
        run: sudo apt-get update && sudo apt-get install -y clang-format clang-tidy

      - name: Check formatting
        run: >
          find include src tests examples -type f
          \( -name '*.hpp' -o -name '*.cpp' \)
          -print0 | xargs -0 clang-format -i

      - name: Configure compile database
        env:
          CXX: clang++
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCPP_THREAD_POOL_BUILD_TESTS=OFF

      - name: Run clang-tidy
        run: >
          find src -name '*.cpp' -print0 |
          xargs -0 clang-tidy -p build

  valgrind:
    name: Valgrind
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind
      - name: Configure and build
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCPP_THREAD_POOL_BUILD_EXAMPLES=OFF
          && cmake --build build --parallel 2
      - name: Memory check
        run: >
          valgrind --leak-check=full --show-leak-kinds=all
          --track-origins=yes --error-exitcode=1
          ./build/cpp_thread_pool_tests

